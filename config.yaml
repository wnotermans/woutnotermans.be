baseURL: "/"
title: woutnotermans
theme: hugo-PaperMod
language_code: en-US

ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

languages:
    en:
      languageName: "English"
      weight: 1
      taxonomies:
        category: categories
        tag: tags
        series: series
      DateFormat: "02/01/2006"
      homeInfoParams:
        Title: "Welcome to woutnotermans.be"
        Content: "This is my personal site and archive."
      menu:
          main:
              - name: About me
                url: about/
                weight: 1
              - name: Projects
                url: projects/
                weight: 2
              - name: Contact
                url: "mailto:woutnotermans1@gmail.com"
                weight: 3
    nl:
      languageName: "Nederlands"
      weight: 2
      taxonomies:
        category: categories
        tag: tags
        series: series
      DateFormat: "02/01/2006"
      homeInfoParams:
        Title: "Welkom op woutnotermans.be"
        Content: "Dit is mijn persoonlijke site and archief."
      menu:
          main:
              - name: School
                url: "https://woutnotermans.be"
                weight: 1
              - name: Over mij
                url: about/
                weight: 2
              - name: Projecten
                url: projects/
                weight: 3
              - name: Contact
                url: "mailto:woutnotermans1@gmail.com"
                weight: 4

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: woutnotermans
  description: "Archive and personal site"
  keywords: [Archive, personal]
  author: Wout Notermans
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  displayFullLangName: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  math: true

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"
    
  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  socialIcons:
    - name: github
      url: "https://github.com/wnotermans"
      
  editPost:
    URL: "https://github.com/<path_to_repo>/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link
    
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: about
      name: About me
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: email
      name: Email
      url: "mailto:woutnotermans1@gmail.com"
      weight: 30

markup:
  goldmark:
    renderer:
      unsafe: true
